name: Deploy Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy website files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "index.html,style.css,app.js,Dockerfile"
          target: "/home/${{ secrets.EC2_USER }}/website"

      - name: Build and run Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # install docker if missing
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            cd /home/${{ secrets.EC2_USER }}/website

            echo "Files copied to server:"
            ls -la

            sudo docker stop website || true
            sudo docker rm website || true

            sudo docker build -t my-website .

            sudo docker run -d --name website -p 80:80 my-website
            sudo docker run -d --name website -p 81:81 my-website

            echo "Running containers:"
            sudo docker ps